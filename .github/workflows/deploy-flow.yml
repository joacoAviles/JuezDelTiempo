name: Mirror FLOW to website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout JuezDelTiempo
        uses: actions/checkout@v4

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: joacoAviles/NOMBRE_DEL_REPO_WEB
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: website

      - name: Replace /flow with JuezDelTiempo content
        run: |
          rm -rf website/flow
          mkdir -p website/flow
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'README.md' \
            ./ website/flow/

      - name: Commit and push website repo
        run: |
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flow
          git commit -m "Mirror FLOW from JuezDelTiempo" || echo "No changes to commit"
          git push
