<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juez del Tiempo</title>
    <meta name="description" content="Página web para organizar tareas y registrar tu tiempo diario.">
    <link rel="stylesheet" href="./static/style.css">
</head>
<body>
<main class="app">
    <header class="hero">
        <div>
            <p class="eyebrow">JUEZ DEL TIEMPO</p>
            <h1>Tu página web de tareas + tracker de tiempo</h1>
            <p class="subtitle">Funciona en tu navegador, guarda todo localmente y exporta reportes listos para pegar en Notion.</p>
        </div>
        <div class="hero-actions">
            <button id="clear-day-btn" class="danger">Reiniciar día</button>
        </div>
    </header>

    <section class="grid">
        <article class="card">
            <h2>Nueva tarea</h2>
            <form id="task-form" class="task-form">
                <input id="title" required maxlength="120" placeholder="Ej: Escribir propuesta comercial">
                <div class="row two">
                    <input id="category" maxlength="40" placeholder="Categoría (Trabajo, Estudio...)">
                    <input id="estimate" type="number" min="5" max="480" value="25" required placeholder="Minutos estimados">
                </div>
                <button type="submit">Agregar tarea</button>
            </form>
        </article>

        <article class="card">
            <h2>Resumen de hoy</h2>
            <div class="stats" id="stats"></div>
        </article>
    </section>

    <section class="card">
        <div class="section-header">
            <h2>Tareas del día</h2>
            <button id="sort-btn" class="secondary">Ordenar por prioridad</button>
        </div>
        <div id="tasks" class="tasks"></div>
    </section>

    <section class="card">
        <div class="section-header">
            <h2>Exportar a Notion</h2>
            <div class="actions-inline">
                <button id="copy-md-btn" class="secondary">Copiar tabla Markdown</button>
                <button id="download-csv-btn" class="secondary">Descargar CSV</button>
            </div>
        </div>
        <textarea id="notion-output" rows="8" readonly></textarea>
    </section>
</main>

<template id="task-template">
    <div class="task-item">
        <div>
            <h3 class="task-title"></h3>
            <p class="meta"></p>
            <p class="progress-label"></p>
        </div>
        <div class="task-controls">
            <button class="start">▶ Iniciar</button>
            <button class="pause secondary">⏸ Pausar</button>
            <button class="complete">✅ Completar</button>
            <button class="delete danger">🗑 Eliminar</button>
        </div>
    </div>
</template>

<script src="./static/app.js"></script>
</body>
</html>
